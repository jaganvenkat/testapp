name: TestGen

on:
  push:
    branches-ignore:
      - main
      - master

jobs:
  run-tests:
    name: testgen
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run TestGen tests
        run: npx jest --testPathPattern="\.testgen\." --no-coverage
